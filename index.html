<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CCTV Calculator PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: radial-gradient(circle at top, #0f2027, #0b132b);
  color: white;
  padding: 20px;
}

.container {
  max-width: 900px;
  margin: auto;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 20px;
  border-radius: 15px;
  margin: 15px 0;
  box-shadow: 0 0 20px rgba(0,255,255,0.1);
}

h1 {
  text-align: center;
}

label {
  display: block;
  margin-top: 10px;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 5px 0;
  border-radius: 8px;
  border: none;
  background: #111;
  color: white;
}

button {
  background: linear-gradient(90deg, #00c6ff, #0072ff);
  border: none;
  padding: 10px;
  margin: 5px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.result-box {
  background: #0f3d2e;
  padding: 15px;
  border-radius: 12px;
  text-align: center;
  box-shadow: 0 0 15px rgba(0,255,100,0.4);
}

.warning {
  color: orange;
  text-align: center;
}
</style>

</head>

<body>

<div class="container">

<h1>📹 CCTV Calculator PRO</h1>

<div class="card">

<label>Cameras</label>
<input id="cam" type="number" value="4">

<label>Bitrate (Mbps)</label>
<input id="bit" type="number" value="2">

<label>Recording Hours: <span id="hVal">24</span></label>
<input type="range" min="1" max="24" value="24"
oninput="hVal.innerText=this.value" id="hours">

<label>Days</label>
<input id="days" type="number" value="30">

<label>Compression</label>
<select id="comp">
<option>H264</option>
<option>H265</option>
</select>

<label>HDD (TB)</label>
<input id="hdd" type="number" value="4">

<label>HDD Count</label>
<input id="count" type="number" value="1">

<button onclick="calc()">Calculate</button>

</div>

<div id="warning" class="warning"></div>

<div class="result-box">
<h2>📊 Backup Days</h2>
<h1 id="result">0 Days</h1>
</div>

<canvas id="chart"></canvas>

</div>

<script>

function calc(){

let cam = +document.getElementById("cam").value;
let bit = +document.getElementById("bit").value;
let hours = +document.getElementById("hours").value;
let days = +document.getElementById("days").value;
let hdd = +document.getElementById("hdd").value;
let count = +document.getElementById("count").value;

let totalBitrate = cam * bit;

let gbPerDay = (bit / 8) * 3600 * hours / 1000;

let totalGbDay = gbPerDay * cam;

let totalStorage = hdd * count * 1000 * 0.9;

let backupDays = totalStorage / totalGbDay;

document.getElementById("result").innerText =
backupDays.toFixed(1) + " Days";

if(backupDays < days){
document.getElementById("warning").innerText =
"⚠️ Storage not enough!";
}else{
document.getElementById("warning").innerText = "";
}

drawChart(backupDays, days);
}

function drawChart(actual, required){

new Chart(document.getElementById("chart"), {
type: 'bar',
data: {
labels: ['Available', 'Required'],
datasets: [{
label: 'Days',
data: [actual, required]
}]
}
});
}

</script>

</body>
</html>
